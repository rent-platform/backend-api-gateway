spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service-auth
              uri: http://user-service:8081
              predicates:
                - Path=/api/auth/**
            - id: user-service-users
              uri: http://user-service:8081
              predicates:
                - Path=/api/users/**

server:
  port: 8080