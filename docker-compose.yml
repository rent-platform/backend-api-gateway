services:

  postgres:
    image: postgres:17
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  user-service:
    build:
      context: ../backend-user-service
      dockerfile: Dockerfile
    container_name: user-service
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: user_db
      PG_USER: postgres
      PG_PASSWORD: 12345
    ports:
      - "8181:8081"

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway-service
    depends_on:
      - user-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8180:8080"

  catalog-service:
    build:
      context: ../backend-catalog-service
      dockerfile: Dockerfile
    container_name: catalog-service
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: catalog_db
      PG_USER: postgres
      PG_PASSWORD: 12345
    ports:
      - "8182:8082"

volumes:
  postgres_data: